<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>UTE Meeting</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/6510466b6c.js" crossorigin="anonymous"></script>
</head>

<body>
    <navbar>
        <div class="logo">UTE Meeting</div>
        <div style="display:flex;align-items:center;gap:16px;">
            <a href="channel.html" style="color:white;text-decoration:none;font-size:14px;font-weight:600;background:rgba(255,255,255,0.15);padding:8px 16px;border-radius:6px;transition:background 0.2s;display:flex;align-items:center;gap:6px;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'"><i class="fas fa-comments"></i> K&#234;nh</a>
        </div>
    </navbar>

        <div class="main">
            <div class="create-join">
                <div class="text"><div class="head"></div>
                <div class="subtext"></div>
                </div>
                <button id="createroom" class="createroom-butt unselectable">T&#7841;o ph&#242;ng</button><br>
                <input type="text" name="room" spellcheck="false" placeholder="Nh&#7853;p m&#227; ph&#242;ng" id="roomcode" class="roomcode"><br>
                <div class="joinroom unselectable" id="joinroom">V&#224;o ph&#242;ng</div>
                
                <!-- Channel Section -->
                <div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);text-align:center;">
                    <p style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:12px;">ho&#7863;c tham gia k&#234;nh &#273;&#7875; giao ti&#7871;p li&#234;n t&#7909;c</p>
                    <a href="channel.html" id="go-to-channel" style="display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#323cae,#5b4ccc);color:white;text-decoration:none;font-size:15px;font-weight:600;padding:12px 28px;border-radius:10px;transition:all 0.3s ease;box-shadow:0 4px 15px rgba(50,60,174,0.3);" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(50,60,174,0.4)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(50,60,174,0.3)'">
                        <i class="fas fa-comments" style="font-size:18px;"></i>
                        V&#224;o K&#234;nh Chat
                    </a>
                </div>
            </div>
            <div class="video-cont">
                <video class="video-self" autoplay muted playsinline></video>
                <div class="settings">
                    <div class="device" id="mic"><i class="fas fa-microphone"></i></div>
                    <div class="device" id="webcam"><i class="fas fa-video"></i></div>
                </div>
            </div>
        </div>

    <script src="js/landing.js"></script>
</body>

</html>
